<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Log Master Logística</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        :root{

            --azul:#1296db;
            --azul-escuro:#3346a1;
            --vermelho:#ef3e42;
            --cinza:#f5f7fb;
            --texto:#1f2937;
            --branco:#ffffff;

        }

        body{
            font-family:'Inter',sans-serif;
            background:var(--cinza);
            color:var(--texto);
            overflow-x:hidden;
        }

        .container{
            width:90%;
            max-width:1280px;
            margin:auto;
        }

        header{
            width:100%;
            position:fixed;
            top:0;
            left:0;
            z-index:9999;
            background:rgba(18,150,219,0.96);
            backdrop-filter:blur(10px);
            border-bottom:4px solid var(--vermelho);
        }

        .nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 0;
        }

        .logo img{
            width:210px;
        }

        nav ul{
            display:flex;
            gap:28px;
            list-style:none;
        }

        nav a{
            text-decoration:none;
            color:white;
            font-weight:600;
            transition:0.3s;
            position:relative;
        }

        nav a:hover{
            color:#ffe3e3;
        }

        nav a::after{
            content:'';
            position:absolute;
            left:0;
            bottom:-6px;
            width:0%;
            height:2px;
            background:var(--vermelho);
            transition:0.3s;
        }

        nav a:hover::after{
            width:100%;
        }

        .hero{
            width:100%;
            height:100vh;
            position:relative;
            overflow:hidden;
        }

        .slide{
            position:absolute;
            width:100%;
            height:100%;
            background-size:cover;
            background-position:center;
            opacity:0;
            transition:opacity 1s ease-in-out;
        }

        .slide.active{
            opacity:1;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:linear-gradient(
                rgba(18,150,219,0.72),
                rgba(51,70,161,0.78)
            );
            z-index:1;
        }

        .hero-content{
            position:relative;
            z-index:2;
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:20px;
        }

        .hero-content h1{
            font-size:68px;
            max-width:950px;
            margin-bottom:25px;
            font-weight:800;
            text-shadow:0 5px 20px rgba(0,0,0,0.35);
        }

        .hero-content p{
            font-size:22px;
            max-width:700px;
            margin-bottom:35px;
        }

        .btn{
            padding:16px 34px;
            background:var(--vermelho);
            color:white;
            text-decoration:none;
            border-radius:14px;
            font-weight:700;
            transition:0.3s;
            box-shadow:0 10px 25px rgba(239,62,66,0.30);
        }

        .btn:hover{
            transform:translateY(-4px);
            background:#d92c30;
        }

        section{
            padding:120px 0;
        }

        .section-title{
            text-align:center;
            margin-bottom:70px;
        }

        .section-title span{
            color:var(--vermelho);
            font-weight:700;
            letter-spacing:2px;
        }

        .section-title h2{
            font-size:48px;
            margin-top:15px;
            color:var(--azul-escuro);
        }

        .about-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:60px;
            align-items:center;
        }

        .about-grid img{
            width:100%;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .about-grid p{
            line-height:1.9;
            margin-bottom:20px;
            color:#4b5563;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:30px;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            transition:0.3s;
            text-align:center;
            border-top:5px solid var(--vermelho);
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card i{
            font-size:52px;
            color:var(--azul);
            margin-bottom:25px;
        }

        .card h3{
            margin-bottom:15px;
            font-size:24px;
            color:var(--azul-escuro);
        }

        .card p{
            color:#6b7280;
            line-height:1.7;
        }

        .gray{
            background:#edf4fb;
        }

        .transport{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:60px;
            align-items:center;
        }

        .transport img{
            width:100%;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .transport p{
            line-height:1.9;
            color:#4b5563;
        }

        .cert-box{
            background:white;
            padding:50px;
            border-radius:24px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            border-bottom:5px solid var(--azul);
        }

        .cert-box i{
            font-size:70px;
            color:var(--vermelho);
            margin-bottom:30px;
        }

        .jobs{
            text-align:center;
        }

        .jobs p{
            max-width:700px;
            margin:auto;
            line-height:1.9;
            color:#4b5563;
            margin-bottom:35px;
        }

        .contact-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
        }

        .contact-info{
            background:white;
            padding:40px;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            border-left:5px solid var(--vermelho);
        }

        .contact-info p{
            margin-bottom:20px;
            font-size:18px;
        }

        .social{
            display:flex;
            gap:20px;
            margin-top:30px;
        }

        .social a{
            width:55px;
            height:55px;
            background:var(--azul);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:50%;
            font-size:24px;
            text-decoration:none;
            transition:0.3s;
        }

        .social a:hover{
            background:var(--vermelho);
            transform:translateY(-5px);
        }

        .form{
            background:white;
            padding:40px;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .form input,
        .form textarea{
            width:100%;
            padding:16px;
            margin-bottom:20px;
            border:1px solid #d1d5db;
            border-radius:12px;
            font-size:16px;
            transition:0.3s;
        }

        .form input:focus,
        .form textarea:focus{
            border-color:var(--azul);
            outline:none;
            box-shadow:0 0 0 4px rgba(18,150,219,0.12);
        }

        .form button{
            width:100%;
            padding:18px;
            border:none;
            background:linear-gradient(
                135deg,
                var(--azul),
                var(--azul-escuro)
            );
            color:white;
            border-radius:12px;
            font-size:18px;
            cursor:pointer;
            font-weight:700;
            transition:0.3s;
        }

        .form button:hover{
            background:linear-gradient(
                135deg,
                var(--vermelho),
                #d92c30
            );
        }

        footer{
            background:var(--azul-escuro);
            color:white;
            text-align:center;
            padding:40px 20px;
            border-top:4px solid var(--vermelho);
        }

        .whatsapp{
            position:fixed;
            bottom:25px;
            right:25px;
            width:70px;
            height:70px;
            background:#25d366;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:38px;
            text-decoration:none;
            z-index:99999;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        @media(max-width:900px){

            nav{
                display:none;
            }

            .hero-content h1{
                font-size:42px;
            }

            .about-grid,
            .transport,
            .contact-grid{
                grid-template-columns:1fr;
            }

            .section-title h2{
                font-size:36px;
            }

            .logo img{
                width:170px;
            }

        }

    </style>

</head>

<body>

<header>

    <div class="container nav">

        <div class="logo">

            <img src="images/logo.png"
                 alt="Log Master">

        </div>

        <nav>

            <ul>

                <li><a href="#home">Home</a></li>

                <li><a href="#logmaster">Log Master</a></li>

                <li><a href="#servicos">Serviços</a></li>

                <li><a href="#transporte">Transporte</a></li>

                <li><a href="#certificacoes">Certificações</a></li>

                <li><a href="#trabalhe">Trabalhe Conosco</a></li>

                <li><a href="#contato">Contato</a></li>

            </ul>

        </nav>

    </div>

</header>

</body>
</html>
